apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: faircare-backend
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    spec:
      containers:
      - image: gcr.io/YOUR_PROJECT_ID/faircare-backend
        env:
        - name: GEMINI_API_KEY
          value: "YOUR_GEMINI_API_KEY_HERE"
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 2Gi
            cpu: 1000m
